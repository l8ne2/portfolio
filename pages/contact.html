<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Aliou Ba</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">Aliou<span>Ba</span></div>
    <nav>
      <a href="../index.html">Accueil</a>
      <a href="about.html">À propos</a>
      <a href="gallery.html">Galerie</a>
      <a href="contact.html" class="actif">Contact</a>
    </nav>
  </header>

  <!-- CONTENU PRINCIPAL -->
  <main>

    <h1 class="titre-section">Contact</h1>
    <div class="separateur"></div>

    <div class="contact-grille">

      <!-- Informations -->
      <div class="contact-info">
        <p>
          N'hésitez pas à me contacter pour toute collaboration,
          projet ou opportunité.
        </p>

        <div class="contact-detail">
          <strong>Téléphone :</strong>
          <span>78 612 08 66</span>
        </div>

        <div class="contact-detail">
          <strong>Email :</strong>
          <span>alioune2803@gmail.com</span>
        </div>

        <div class="contact-detail">
          <strong>Ville :</strong>
          <span>Bargny, Dakar — Sénégal</span>
        </div>
      </div>

      <!-- Formulaire -->
      <form class="contact-form" action="#" method="post">

        <div class="champ">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" placeholder="Votre nom complet" required>
        </div>

        <div class="champ">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="votre@email.com" required>
        </div>

        <div class="champ">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Votre message..." required></textarea>
        </div>

        <button type="submit" class="btn">Envoyer</button>

        <p class="contact-fin">Je vous répondrai dans les plus brefs délais.</p>

      </form>

    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 Aliou Ba — L3 Informatique</p>
  </footer>

</body>
</html>
